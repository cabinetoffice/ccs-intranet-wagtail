version: '3.8'
services:
  db:
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: changeme
    restart: unless-stopped
    image: public.ecr.aws/docker/library/postgres:14.1
    expose:
      - '5432'
    ports:
      - '5434:5432'
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 3s
      timeout: 5s
      retries: 5

  app:
    container_name: ccsintranet_app
    environment:
      SECRET_KEY: changeme
      DATABASE_URL: postgres://app_user:changeme@db/app_db
      DJANGO_SETTINGS_MODULE: ccsintranet.settings.base
      LISTEN_PORT: 8000
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - ./ccsintranet:/code/ccsintranet
    links:
      - db:db
    ports:
      - '8000:8000'
    stdin_open: true
    tty: true
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--write-out", "HTTP CODE : %{http_code}\n",  "--output",  "/dev/null",  "http://127.0.0.1:8080/admin"]
      start_period: 60s
      interval: 60s
      timeout: 10s
      retries: 10
